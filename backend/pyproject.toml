[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["data", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]  # 行长由 formatter 控制

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]
