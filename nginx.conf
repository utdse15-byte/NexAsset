server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 安全相关 header
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 关闭浏览器对相机/麦克风/定位等高敏感能力的暴露 (本应用不需要)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP: 允许同源脚本/样式; 'unsafe-inline' 给 antd cssinjs / shiki 等运行时注入的 style;
    # data: 给 svg/字体; blob: 给 MSW worker 与动态 worker; https: 给图床/外链文档站头像。
    # 如需更严格策略, 后续可移到 Report-Only 模式收集违规再收紧。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; worker-src 'self' blob:; frame-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

    # 限制请求体, AI 对话最多 100KB 完全够用
    client_max_body_size 256k;

    # SPA 入口 index.html 必须不缓存, 否则升级前端后浏览器拿不到新 hash
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # React SPA - 所有路由都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理 AI 后端 API
    location /api/ai/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式支持: 关闭缓冲, 拉长读超时
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # 缓存带 hash 的静态资源 (Vite build 出的 js/css 都带 hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
