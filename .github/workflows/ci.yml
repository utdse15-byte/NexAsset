name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    name: Frontend (lint / typecheck / test)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.8.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and linting
        run: pnpm biome check .

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Run tests
        run: pnpm test

      # 安全审计 - 报告但不阻塞 (允许失败), 在 Actions UI 看到漏洞列表后再决定是否升级依赖
      - name: Frontend audit (advisory)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  backend:
    name: Backend (lint / smoke)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Smoke tests
        env:
          # Gemini 调用全部被 mock, 这里只是占位避免 ChatGoogleGenerativeAI 校验
          GEMINI_API_KEY: AIza-test-not-a-real-key
        run: pytest -q

      # Python 依赖安全审计 - 报告但不阻塞
      - name: Backend audit (advisory)
        run: |
          pip install pip-audit==2.7.3
          pip-audit -r requirements.txt || true
        continue-on-error: true
